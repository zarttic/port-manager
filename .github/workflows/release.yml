name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build
        run: wails build -platform ${{ matrix.platform }}/${{ matrix.arch }}

      - name: Create artifact (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd build/bin
          Compress-Archive -Path port-manager.exe -DestinationPath port-manager-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Create artifact (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd build/bin
          tar -czf port-manager-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz port-manager

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: port-manager-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            build/bin/port-manager-${{ matrix.platform }}-${{ matrix.arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
